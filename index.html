  "Bulgarian NBL": "#006db3",
  "BSL": "#e30a17",
  "default": "#4a5568",
};

const TRANSACTION_COLORS = {
  "Draft": "#16a34a",
  "Signing": "#2563eb",
  "Trade": "#d97706",
  "Release": "#dc2626",
  "Injury": "#9333ea",
  "Return": "#0891b2",
  "Game": "#2a5070",
  "Other": "#6b7280",
};

function leagueColor(league) {
  return LEAGUE_COLORS[league] || LEAGUE_COLORS["default"];
}

function txColor(type) {
  return TRANSACTION_COLORS[type] || TRANSACTION_COLORS["Other"];
}

function ProLOWD() {
  const [players, setPlayers] = useState([]);
  const [transactions, setTransactions] = useState([]);
  const [view, setView] = useState("roster"); // roster | transactions | player
  const [selectedPlayer, setSelectedPlayer] = useState(null);
  const [search, setSearch] = useState("");
  const [filterLeague, setFilterLeague] = useState("All");
  const [editingPlayer, setEditingPlayer] = useState(null);
  const [editingTx, setEditingTx] = useState(null);
  const [showAddTx, setShowAddTx] = useState(false);
  const [showAddPlayer, setShowAddPlayer] = useState(false);
  const [newTx, setNewTx] = useState({ date: "", player: "", type: "Signing", detail: "" });
  const [newPlayer, setNewPlayer] = useState({ name: "", team: "", league: "NBA", country: "USA", position: "", udYears: "", notes: "", twitter: "", stats: { pts: "", reb: "", ast: "", gp: "", season: "2025–26" } });
  const [saveMsg, setSaveMsg] = useState("");

  // Load from storage
  useEffect(() => {
    try {
      const p = localStorage.getItem(STORAGE_KEY);
      setPlayers(p ? JSON.parse(p) : DEFAULT_PLAYERS);
    } catch {
      setPlayers(DEFAULT_PLAYERS);
    }
    try {
      const t = localStorage.getItem(TRANSACTIONS_KEY);
      setTransactions(t ? JSON.parse(t) : DEFAULT_TRANSACTIONS);
    } catch {
      setTransactions(DEFAULT_TRANSACTIONS);
    }
  }, []);

  function savePlayers(updated) {
    setPlayers(updated);
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(updated)); } catch {}
  }

  function saveTransactions(updated) {
    setTransactions(updated);
    try { localStorage.setItem(TRANSACTIONS_KEY, JSON.stringify(updated)); } catch {}
  }

  function flash(msg) {
    setSaveMsg(msg);
    setTimeout(() => setSaveMsg(""), 2000);
  }

  const leagues = ["All", ...Array.from(new Set(players.map(p => p.league)))];

  const filteredPlayers = players.filter(p => {
    const matchSearch = !search || p.name.toLowerCase().includes(search.toLowerCase()) || p.team.toLowerCase().includes(search.toLowerCase());
    const matchLeague = filterLeague === "All" || p.league === filterLeague;
    return matchSearch && matchLeague && p.active;
  });

  function openPlayer(player) {
    setSelectedPlayer(player);
    setEditingPlayer(null);
    setView("player");
  }

  function savePlayerEdit(updated) {
    const newList = players.map(p => p.id === updated.id ? updated : p);
    savePlayers(newList);
    setSelectedPlayer(updated);
    setEditingPlayer(null);
    flash("Saved ✓");
  }

  function addTransaction() {
    if (!newTx.player || !newTx.detail || !newTx.date) return;
    const tx = { ...newTx, id: Date.now() };
    const updated = [tx, ...transactions];
    saveTransactions(updated);
    setNewTx({ date: "", player: "", type: "Signing", detail: "" });
    setShowAddTx(false);
    flash("Transaction added ✓");
  }

  function deleteTx(id) {
    saveTransactions(transactions.filter(t => t.id !== id));
    flash("Deleted");
  }

  function addPlayer() {
    if (!newPlayer.name || !newPlayer.team) return;
    const p = { ...newPlayer, id: Date.now(), active: true, stats: { ...newPlayer.stats } };
    savePlayers([...players, p]);
    setNewPlayer({ name: "", team: "", league: "NBA", country: "USA", position: "", udYears: "", notes: "", twitter: "", stats: { pts: "", reb: "", ast: "", gp: "", season: "2025–26" } });
    setShowAddPlayer(false);
    flash("Player added ✓");
  }

  const playerTxs = selectedPlayer ? transactions.filter(t => t.player === selectedPlayer.name).sort((a, b) => new Date(b.date) - new Date(a.date)) : [];

  return (
    <div style={{ fontFamily: "'Georgia', serif", background: "#ffffff", minHeight: "100vh", color: "#0d1b2a" }}>
      {/* Header */}
      <div style={{ background: "linear-gradient(135deg, #3ab4dc 0%, #5bc8f5 50%, #3ab4dc 100%)", borderBottom: "2px solid #cc2229", padding: "20px 24px 16px" }}>
        <div style={{ maxWidth: 900, margin: "0 auto" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 4 }}>
            <div style={{ fontSize: 28, fontWeight: 700, letterSpacing: "-0.5px", color: "#cc2229" }}>@ProLOWD</div>
            <div style={{ fontSize: 13, color: "#2a6080", fontStyle: "italic", marginTop: 2 }}>Professionally LOWD · Flyers in the Pros</div>
          </div>
          <div style={{ display: "flex", gap: 8, marginTop: 12 }}>
            {["roster", "transactions"].map(v => (
              <button key={v} onClick={() => setView(v)} style={{
                background: view === v ? "#cc2229" : "transparent",
                color: view === v ? "#ffffff" : "#cc2229",
                border: "1px solid #cc2229",
                borderRadius: 4,
                padding: "6px 18px",
                fontFamily: "Georgia, serif",
                fontSize: 13,
                fontWeight: view === v ? 700 : 400,
                cursor: "pointer",
                letterSpacing: "0.5px",
                textTransform: "uppercase",
              }}>
                {v === "roster" ? "📋 Roster" : "🔁 Transactions"}
              </button>
            ))}
          </div>
        </div>
      </div>

      {saveMsg && (
        <div style={{ position: "fixed", top: 16, right: 16, background: "#16a34a", color: "#fff", padding: "8px 18px", borderRadius: 6, fontFamily: "Georgia, serif", fontSize: 13, zIndex: 999, boxShadow: "0 2px 12px rgba(0,0,0,0.5)" }}>
          {saveMsg}
        </div>
      )}

      <div style={{ maxWidth: 900, margin: "0 auto", padding: "20px 16px" }}>

        {/* ROSTER VIEW */}
        {view === "roster" && (
          <>
            <div style={{ display: "flex", gap: 10, marginBottom: 16, flexWrap: "wrap", alignItems: "center" }}>
              <input
                placeholder="Search player or team…"
                value={search}
                onChange={e => setSearch(e.target.value)}
                style={{ flex: 1, minWidth: 180, background: "#f0f8fc", border: "1px solid #2d3a4e", borderRadius: 4, padding: "8px 12px", color: "#0d1b2a", fontFamily: "Georgia, serif", fontSize: 14 }}
              />
              <select value={filterLeague} onChange={e => setFilterLeague(e.target.value)} style={{ background: "#f0f8fc", border: "1px solid #2d3a4e", borderRadius: 4, padding: "8px 10px", color: "#0d1b2a", fontFamily: "Georgia, serif", fontSize: 13 }}>
                {leagues.map(l => <option key={l}>{l}</option>)}
              </select>
              <button onClick={() => setShowAddPlayer(true)} style={{ background: "#cc2229", color: "#ffffff", border: "none", borderRadius: 4, padding: "8px 16px", fontFamily: "Georgia, serif", fontSize: 13, fontWeight: 700, cursor: "pointer" }}>
                + Add Player
              </button>
            </div>

            {showAddPlayer && (
              <div style={{ background: "#f0f8fc", border: "1px solid #cc2229", borderRadius: 8, padding: 20, marginBottom: 20 }}>
                <div style={{ fontWeight: 700, color: "#cc2229", marginBottom: 12, fontSize: 15 }}>Add New Player</div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                  {[["name","Name*"],["team","Team*"],["league","League"],["country","Country"],["position","Position"],["udYears","UD Years"],["twitter","Twitter handle"]].map(([field, label]) => (
                    <input key={field} placeholder={label} value={newPlayer[field] || ""} onChange={e => setNewPlayer(p => ({ ...p, [field]: e.target.value }))}
                      style={{ background: "#e0f2fa", border: "1px solid #2d3a4e", borderRadius: 4, padding: "7px 10px", color: "#0d1b2a", fontFamily: "Georgia, serif", fontSize: 13 }} />
                  ))}
                </div>
                <textarea placeholder="Notes" value={newPlayer.notes} onChange={e => setNewPlayer(p => ({ ...p, notes: e.target.value }))}
                  style={{ width: "100%", marginTop: 10, background: "#e0f2fa", border: "1px solid #2d3a4e", borderRadius: 4, padding: "7px 10px", color: "#0d1b2a", fontFamily: "Georgia, serif", fontSize: 13, resize: "vertical", boxSizing: "border-box" }} rows={2} />
                <div style={{ display: "flex", gap: 8, marginTop: 12 }}>
                  <button onClick={addPlayer} style={{ background: "#cc2229", color: "#ffffff", border: "none", borderRadius: 4, padding: "7px 18px", fontFamily: "Georgia, serif", fontSize: 13, fontWeight: 700, cursor: "pointer" }}>Save</button>
                  <button onClick={() => setShowAddPlayer(false)} style={{ background: "transparent", color: "#2a6080", border: "1px solid #2d3a4e", borderRadius: 4, padding: "7px 14px", fontFamily: "Georgia, serif", fontSize: 13, cursor: "pointer" }}>Cancel</button>
                </div>
              </div>
            )}

            <div style={{ display: "grid", gap: 10 }}>
              {filteredPlayers.length === 0 && <div style={{ color: "#2a6080", textAlign: "center", padding: 40 }}>No players found.</div>}
              {filteredPlayers.map(player => (
                <div key={player.id} onClick={() => openPlayer(player)} style={{ background: "#f0f8fc", border: "1px solid #1e2d40", borderRadius: 8, padding: "14px 18px", cursor: "pointer", display: "flex", alignItems: "center", gap: 16, transition: "border-color 0.15s" }}
                  onMouseEnter={e => e.currentTarget.style.borderColor = "#cc2229"}
                  onMouseLeave={e => e.currentTarget.style.borderColor = "#a8daf0"}>
                  <div style={{ flex: 1 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 4 }}>
                      <span style={{ fontWeight: 700, fontSize: 16, color: "#0d1b2a" }}>{player.name}</span>
                      <span style={{ fontSize: 11, fontWeight: 700, background: leagueColor(player.league), color: "#fff", borderRadius: 3, padding: "2px 7px", letterSpacing: "0.3px" }}>{player.league}</span>
                    </div>
                    <div style={{ fontSize: 13, color: "#1a4a6a" }}>{player.team} · {player.position} · UD {player.udYears}</div>
                    {player.notes && <div style={{ fontSize: 12, color: "#3a6888", marginTop: 4, fontStyle: "italic" }}>{player.notes}</div>}
                  </div>
                  <div style={{ textAlign: "right", minWidth: 80 }}>
                    {player.stats?.pts !== "" && <div style={{ fontSize: 20, fontWeight: 700, color: "#cc2229" }}>{player.stats.pts}</div>}
                    {player.stats?.pts !== "" && <div style={{ fontSize: 11, color: "#4a7898" }}>PPG</div>}
                  </div>
                </div>
              ))}
            </div>
          </>
        )}

        {/* TRANSACTIONS VIEW */}
        {view === "transactions" && (
          <>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
              <div style={{ color: "#1a4a6a", fontSize: 14 }}>{transactions.length} transaction{transactions.length !== 1 ? "s" : ""} logged</div>
              <button onClick={() => setShowAddTx(true)} style={{ background: "#cc2229", color: "#ffffff", border: "none", borderRadius: 4, padding: "8px 16px", fontFamily: "Georgia, serif", fontSize: 13, fontWeight: 700, cursor: "pointer" }}>
                + Log Transaction
              </button>
            </div>

            {showAddTx && (
              <div style={{ background: "#f0f8fc", border: "1px solid #cc2229", borderRadius: 8, padding: 20, marginBottom: 20 }}>
                <div style={{ fontWeight: 700, color: "#cc2229", marginBottom: 12, fontSize: 15 }}>Log Transaction / Note</div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10, marginBottom: 10 }}>
                  <input type="date" value={newTx.date} onChange={e => setNewTx(t => ({ ...t, date: e.target.value }))}
                    style={{ background: "#e0f2fa", border: "1px solid #2d3a4e", borderRadius: 4, padding: "7px 10px", color: "#0d1b2a", fontFamily: "Georgia, serif", fontSize: 13 }} />
                  <input placeholder="Player name" value={newTx.player} onChange={e => setNewTx(t => ({ ...t, player: e.target.value }))}
                    list="player-names"
                    style={{ background: "#e0f2fa", border: "1px solid #2d3a4e", borderRadius: 4, padding: "7px 10px", color: "#0d1b2a", fontFamily: "Georgia, serif", fontSize: 13 }} />
                  <datalist id="player-names">{players.map(p => <option key={p.id} value={p.name} />)}</datalist>
                  <select value={newTx.type} onChange={e => setNewTx(t => ({ ...t, type: e.target.value }))}
                    style={{ background: "#e0f2fa", border: "1px solid #2d3a4e", borderRadius: 4, padding: "7px 10px", color: "#0d1b2a", fontFamily: "Georgia, serif", fontSize: 13 }}>
                    {Object.keys(TRANSACTION_COLORS).map(k => <option key={k}>{k}</option>)}
                  </select>
                </div>
                <textarea placeholder="Details…" value={newTx.detail} onChange={e => setNewTx(t => ({ ...t, detail: e.target.value }))}
                  style={{ width: "100%", background: "#e0f2fa", border: "1px solid #2d3a4e", borderRadius: 4, padding: "7px 10px", color: "#0d1b2a", fontFamily: "Georgia, serif", fontSize: 13, resize: "vertical", boxSizing: "border-box" }} rows={2} />
                <div style={{ display: "flex", gap: 8, marginTop: 12 }}>
                  <button onClick={addTransaction} style={{ background: "#cc2229", color: "#ffffff", border: "none", borderRadius: 4, padding: "7px 18px", fontFamily: "Georgia, serif", fontSize: 13, fontWeight: 700, cursor: "pointer" }}>Save</button>
                  <button onClick={() => setShowAddTx(false)} style={{ background: "transparent", color: "#2a6080", border: "1px solid #2d3a4e", borderRadius: 4, padding: "7px 14px", fontFamily: "Georgia, serif", fontSize: 13, cursor: "pointer" }}>Cancel</button>
                </div>
              </div>
            )}

            <div style={{ display: "grid", gap: 8 }}>
              {[...transactions].sort((a, b) => new Date(b.date) - new Date(a.date)).map(tx => (
                <div key={tx.id} style={{ background: "#f0f8fc", border: "1px solid #1e2d40", borderRadius: 8, padding: "12px 16px", display: "flex", gap: 14, alignItems: "flex-start" }}>
                  <div style={{ minWidth: 8, width: 8, height: 8, borderRadius: "50%", background: txColor(tx.type), marginTop: 6, flexShrink: 0 }} />
                  <div style={{ flex: 1 }}>
                    <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 3 }}>
                      <span style={{ fontWeight: 700, fontSize: 14, color: "#0d1b2a" }}>{tx.player}</span>
                      <span style={{ fontSize: 11, fontWeight: 700, background: txColor(tx.type), color: "#fff", borderRadius: 3, padding: "2px 7px" }}>{tx.type}</span>
                      <span style={{ fontSize: 12, color: "#4a7898", marginLeft: "auto" }}>{tx.date}</span>
                    </div>
                    <div style={{ fontSize: 13, color: "#1a4a6a" }}>{tx.detail}</div>
                  </div>
                  <button onClick={() => deleteTx(tx.id)} style={{ background: "transparent", border: "none", color: "#4a5a6a", cursor: "pointer", fontSize: 16, padding: "0 4px", lineHeight: 1 }} title="Delete">×</button>
                </div>
              ))}
            </div>
          </>
        )}

        {/* PLAYER DETAIL VIEW */}
        {view === "player" && selectedPlayer && (
          <>
            <button onClick={() => { setView("roster"); setEditingPlayer(null); }} style={{ background: "transparent", border: "none", color: "#cc2229", fontFamily: "Georgia, serif", fontSize: 13, cursor: "pointer", padding: 0, marginBottom: 16 }}>
              ← Back to Roster
            </button>

            {editingPlayer ? (
              <PlayerEditForm player={editingPlayer} onSave={savePlayerEdit} onCancel={() => setEditingPlayer(null)} />
            ) : (
              <div>
                <div style={{ background: "#f0f8fc", border: "1px solid #2d3a4e", borderRadius: 10, padding: 24, marginBottom: 20 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 16 }}>
                    <div>
                      <div style={{ fontSize: 26, fontWeight: 700, color: "#0d1b2a", marginBottom: 4 }}>{selectedPlayer.name}</div>
                      <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                        <span style={{ fontSize: 12, fontWeight: 700, background: leagueColor(selectedPlayer.league), color: "#fff", borderRadius: 3, padding: "2px 8px" }}>{selectedPlayer.league}</span>
                        <span style={{ fontSize: 13, color: "#1a4a6a" }}>{selectedPlayer.team}</span>
                        <span style={{ fontSize: 13, color: "#4a7898" }}>· {selectedPlayer.position}</span>
                      </div>
                      <div style={{ fontSize: 13, color: "#4a7898", marginTop: 6 }}>UD {selectedPlayer.udYears} · {selectedPlayer.country}</div>
                      {selectedPlayer.twitter && (
                        <div style={{ fontSize: 12, color: "#4a9eff", marginTop: 4 }}>@{selectedPlayer.twitter}</div>
                      )}
                    </div>
                    <button onClick={() => setEditingPlayer({ ...selectedPlayer })} style={{ background: "transparent", border: "1px solid #cc2229", color: "#cc2229", borderRadius: 4, padding: "6px 14px", fontFamily: "Georgia, serif", fontSize: 12, cursor: "pointer" }}>
                      ✏ Edit
                    </button>
                  </div>

                  {/* Stats */}
                  <div style={{ display: "flex", gap: 16, marginBottom: selectedPlayer.notes ? 16 : 0, flexWrap: "wrap" }}>
                    {[["pts", "PPG"], ["reb", "RPG"], ["ast", "APG"], ["gp", "GP"]].map(([field, label]) => (
                      selectedPlayer.stats?.[field] !== "" && selectedPlayer.stats?.[field] !== undefined ? (
                        <div key={field} style={{ background: "#3ab4dc", borderRadius: 6, padding: "12px 20px", textAlign: "center", minWidth: 70 }}>
                          <div style={{ fontSize: 22, fontWeight: 700, color: "#cc2229" }}>{selectedPlayer.stats[field]}</div>
                          <div style={{ fontSize: 11, color: "#4a7898", letterSpacing: "0.5px" }}>{label}</div>
                        </div>
                      ) : null
                    ))}
                    {selectedPlayer.stats?.season && <div style={{ fontSize: 11, color: "#3a4a5a", alignSelf: "flex-end", marginBottom: 6 }}>{selectedPlayer.stats.season}</div>}
                  </div>

                  {selectedPlayer.notes && (
                    <div style={{ background: "#dff5ff", borderRadius: 6, padding: "10px 14px", fontSize: 13, color: "#1a4060", fontStyle: "italic", borderLeft: "3px solid #cc2229" }}>
                      {selectedPlayer.notes}
                    </div>
                  )}
                </div>

                {/* Player Transactions */}
                <div style={{ fontWeight: 700, color: "#cc2229", fontSize: 14, marginBottom: 10, letterSpacing: "0.5px", textTransform: "uppercase" }}>
                  Transaction Log
                </div>
                {playerTxs.length === 0 ? (
                  <div style={{ color: "#4a5a6a", fontSize: 13, fontStyle: "italic" }}>No transactions logged yet.</div>
                ) : (
                  <div style={{ display: "grid", gap: 8 }}>
                    {playerTxs.map(tx => (
                      <div key={tx.id} style={{ background: "#f0f8fc", border: "1px solid #1e2d40", borderRadius: 8, padding: "10px 14px", display: "flex", gap: 12 }}>
                        <div style={{ minWidth: 8, width: 8, height: 8, borderRadius: "50%", background: txColor(tx.type), marginTop: 5, flexShrink: 0 }} />
                        <div>
                          <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 3 }}>
                            <span style={{ fontSize: 11, fontWeight: 700, background: txColor(tx.type), color: "#fff", borderRadius: 3, padding: "2px 7px" }}>{tx.type}</span>
                            <span style={{ fontSize: 12, color: "#4a7898" }}>{tx.date}</span>
                          </div>
                          <div style={{ fontSize: 13, color: "#1a4a6a" }}>{tx.detail}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                )}

                <button onClick={() => { setShowAddTx(true); setNewTx(t => ({ ...t, player: selectedPlayer.name })); setView("transactions"); }}
                  style={{ marginTop: 16, background: "transparent", border: "1px solid #cc2229", color: "#cc2229", borderRadius: 4, padding: "7px 16px", fontFamily: "Georgia, serif", fontSize: 13, cursor: "pointer" }}>
                  + Log Transaction for {selectedPlayer.name}
                </button>
              </div>
            )}
          </>
        )}
      </div>
    </div>
  );
}

function PlayerEditForm({ player, onSave, onCancel }) {
  const [form, setForm] = useState({ ...player, stats: { ...player.stats } });

  function field(key, label, type = "text") {
    return (
      <div key={key} style={{ display: "flex", flexDirection: "column", gap: 4 }}>
        <label style={{ fontSize: 11, color: "#4a7898", letterSpacing: "0.5px", textTransform: "uppercase" }}>{label}</label>
        <input type={type} value={form[key] || ""} onChange={e => setForm(f => ({ ...f, [key]: e.target.value }))}
          style={{ background: "#e0f2fa", border: "1px solid #7ac8e8", borderRadius: 4, padding: "7px 10px", color: "#0d1b2a", fontFamily: "Georgia, serif", fontSize: 14 }} />
      </div>
    );
  }

  function statField(key, label) {
    return (
      <div key={key} style={{ display: "flex", flexDirection: "column", gap: 4 }}>
        <label style={{ fontSize: 11, color: "#4a7898", letterSpacing: "0.5px", textTransform: "uppercase" }}>{label}</label>
        <input value={form.stats[key] || ""} onChange={e => setForm(f => ({ ...f, stats: { ...f.stats, [key]: e.target.value } }))}
          style={{ background: "#e0f2fa", border: "1px solid #7ac8e8", borderRadius: 4, padding: "7px 10px", color: "#0d1b2a", fontFamily: "Georgia, serif", fontSize: 14 }} />
      </div>
    );
  }

  return (
    <div style={{ background: "#f0f8fc", border: "1px solid #cc2229", borderRadius: 10, padding: 24 }}>
      <div style={{ fontWeight: 700, color: "#cc2229", fontSize: 16, marginBottom: 18 }}>Editing: {player.name}</div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, marginBottom: 14 }}>
        {field("name", "Name")}
        {field("team", "Current Team")}
        {field("league", "League")}
        {field("country", "Country")}
        {field("position", "Position")}
        {field("udYears", "UD Years")}
        {field("twitter", "Twitter Handle")}
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(5, 1fr)", gap: 10, marginBottom: 14 }}>
        {statField("pts", "PPG")}
        {statField("reb", "RPG")}
        {statField("ast", "APG")}
        {statField("gp", "GP")}
        {statField("season", "Season")}
      </div>
      <div style={{ display: "flex", flexDirection: "column", gap: 4, marginBottom: 18 }}>
        <label style={{ fontSize: 11, color: "#4a7898", letterSpacing: "0.5px", textTransform: "uppercase" }}>Notes</label>
        <textarea value={form.notes || ""} onChange={e => setForm(f => ({ ...f, notes: e.target.value }))} rows={3}
          style={{ background: "#e0f2fa", border: "1px solid #7ac8e8", borderRadius: 4, padding: "7px 10px", color: "#0d1b2a", fontFamily: "Georgia, serif", fontSize: 14, resize: "vertical" }} />
      </div>
      <div style={{ display: "flex", gap: 10 }}>
        <button onClick={() => onSave(form)} style={{ background: "#cc2229", color: "#ffffff", border: "none", borderRadius: 4, padding: "8px 22px", fontFamily: "Georgia, serif", fontSize: 14, fontWeight: 700, cursor: "pointer" }}>Save Changes</button>
        <button onClick={onCancel} style={{ background: "transparent", border: "1px solid #2d3a4e", color: "#2a6080", borderRadius: 4, padding: "8px 16px", fontFamily: "Georgia, serif", fontSize: 14, cursor: "pointer" }}>Cancel</button>
      </div>
    </div>
